name: Build iOS App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub UI

jobs:
  build-ios:
    name: 🍎 Build iOS
    runs-on: macos-latest

    steps:
      # 1. Checkout code
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # 2. Cài PHP 8.4
      - name: 🐘 Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, bcmath, sqlite3, pdo_sqlite
          coverage: none

      # 3. Cache Composer packages
      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # 4. Cài Composer dependencies
      - name: 🔧 Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-req=php

      # 5. Tạo file .env
      - name: ⚙️ Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # 6. Chạy database migrations
      - name: 🗄️ Run migrations
        run: php artisan migrate --force

      # 7. Cài Node.js và build assets
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install npm dependencies
        run: npm ci

      - name: 🏗️ Build frontend assets
        run: npm run build

      # 8. Cài Xcode tools
      - name: 🔨 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # 9. Build iOS app
      - name: 🍎 Build iOS (Simulator)
        run: php artisan native:build ios --no-interaction
        env:
          NATIVEPHP_APP_ID: com.habitgoat.app
          NATIVEPHP_APP_NAME: "Habit Goat"
          NATIVEPHP_APP_VERSION: "1.0.0"

      # 10. Upload artifact (file .app hoặc .ipa)
      - name: 📤 Upload iOS build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: habit-goat-ios-${{ github.sha }}
          path: |
            ios/build/**/*.app
            ios/build/**/*.ipa
          retention-days: 7
          if-no-files-found: warn
